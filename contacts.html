<script src="https://api-maps.yandex.ru/2.1/?apikey=ef835738-e8f3-4b3b-853a-b0b6c0dcfc47&lang=ru_RU" type="text/javascript"></script>

<script>
    const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSecd_2opjvhv7uQhgDBlAlqW1Lt7-i7pumOCbQkP0hyyz7czQ/viewform?embedded=true';

    // Инициализация карты
    function initMap() {
        var myMap = new ymaps.Map("yandexMap", {
            center: [51.660781, 39.200296],
            zoom: 16,
            controls: ['zoomControl', 'fullscreenControl']
        });
        var myPlacemark = new ymaps.Placemark(
            [51.660781, 39.200296],
            { 
                hintContent: 'ПромТехСофт', 
                balloonContent: '<div style="padding:10px;"><strong>ПромТехСофт</strong><br>📍 Воронеж, Плехановская, 11</div>' 
            },
            {
                iconLayout: 'default#image',
                iconImageHref: 'data:image/svg+xml;base64,' + btoa('<svg xmlns="http://www.w3.org/2000/svg" width="40" height="50"><path d="M20 0C8.95 0 0 8.95 0 20c0 15 20 30 20 30s20-15 20-30C40 8.95 31.05 0 20 0z" fill="#00d4aa" stroke="#0a1628" stroke-width="2"/><circle cx="20" cy="20" r="8" fill="white"/></svg>'),
                iconImageSize: [40, 50],
                iconImageOffset: [-20, -50]
            }
        );
        myMap.geoObjects.add(myPlacemark);
    }
    ymaps.ready(initMap);

    // Создание частиц для анимации успеха
    function createParticles(container) {
        const particlesContainer = document.createElement('div');
        particlesContainer.className = 'particles';
        
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const angle = (Math.PI * 2 * i) / 20;
            const distance = 50 + Math.random() * 100;
            
            particle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
            particle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
            particle.style.left = '50%';
            particle.style.top = '50%';
            particle.style.animationDelay = Math.random() * 0.5 + 's';
            
            particlesContainer.appendChild(particle);
        }
        
        container.appendChild(particlesContainer);
    }

    // Показать экран успешной отправки
    function showSuccessScreen(modalBody) {
        // Создаем оверлей успеха
        const successOverlay = document.createElement('div');
        successOverlay.className = 'success-overlay';
        
        // Создаем частицы
        createParticles(successOverlay);
        
        // Контент успеха
        const successContent = document.createElement('div');
        successContent.className = 'success-content';
        
        successContent.innerHTML = `
            <div class="success-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h3 class="success-title">Заявление подано! 🎉</h3>
            <p class="success-message">
                Спасибо! Мы получили вашу заявку<br>
                и свяжемся с вами в ближайшее время.
            </p>
            <button class="btn btn-primary success-btn" onclick="closeFormModal()">
                Отлично
            </button>
        `;
        
        successOverlay.appendChild(successContent);
        modalBody.style.position = 'relative';
        modalBody.appendChild(successOverlay);
        
        // Запускаем анимацию
        setTimeout(() => {
            successOverlay.classList.add('active');
        }, 100);
    }

    // Отслеживание отправки Google Form
    function setupFormSubmitListener(iframe) {
        // Пытаемся отследить отправку формы через сообщения
        window.addEventListener('message', function(event) {
            // Google Forms отправляет сообщение при отправке
            if (event.data && event.data.type === 'formSubmitted') {
                handleFormSubmit();
            }
        });
        
        // Альтернативный метод: отслеживание изменения URL внутри iframe
        const checkInterval = setInterval(() => {
            try {
                // Проверяем, не перешел ли iframe на страницу подтверждения
                const iframeUrl = iframe.contentWindow.location.href;
                if (iframeUrl && iframeUrl.includes('formResponse')) {
                    clearInterval(checkInterval);
                    setTimeout(() => handleFormSubmit(), 500);
                }
            } catch (e) {
                // Междоменные ограничения не позволяют читать URL
                // Используем fallback
            }
        }, 1000);
        
        // Очищаем интервал через 5 минут (если форма не отправлена)
        setTimeout(() => clearInterval(checkInterval), 300000);
    }

    function handleFormSubmit() {
        const modalBody = document.querySelector('.modal-body');
        if (modalBody && !modalBody.querySelector('.success-overlay')) {
            // Плавно скрываем iframe
            const iframe = modalBody.querySelector('iframe');
            if (iframe) {
                iframe.style.transition = 'opacity 0.3s ease';
                iframe.style.opacity = '0';
                
                setTimeout(() => {
                    iframe.style.display = 'none';
                    showSuccessScreen(modalBody);
                }, 300);
            } else {
                showSuccessScreen(modalBody);
            }
        }
    }

    // Модифицированная функция открытия модального окна
    function openFormModal() {
        const modal = document.getElementById('formModal');
        const modalBody = modal.querySelector('.modal-body');
        
        // Очищаем предыдущий контент
        modalBody.innerHTML = '';
        modalBody.style.position = 'relative';
        
        // Создаём новый iframe
        const iframe = document.createElement('iframe');
        iframe.id = 'googleFormFrame';
        iframe.src = FORM_URL;
        iframe.style.width = '100%';
        iframe.style.height = '65vh';
        iframe.style.minHeight = '550px';
        iframe.style.border = 'none';
        iframe.setAttribute('frameborder', '0');
        iframe.setAttribute('allowfullscreen', 'true');
        
        // Вставляем iframe
        modalBody.appendChild(iframe);
        
        // Показываем модальное окно
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        
        // Настраиваем отслеживание отправки формы
        iframe.onload = function() {
            setupFormSubmitListener(iframe);
        };
    }

    function closeFormModal() {
        const modal = document.getElementById('formModal');
        modal.classList.remove('active');
        document.body.style.overflow = '';
        
        // Задержка для завершения анимации закрытия
        setTimeout(() => {
            const modalBody = modal.querySelector('.modal-body');
            if (modalBody) {
                modalBody.innerHTML = '';
            }
        }, 500);
    }

    // Закрытие по клику вне модального окна
    document.getElementById('formModal').addEventListener('click', function(e) {
        if (e.target === this) closeFormModal();
    });

    // Закрытие по Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeFormModal();
    });

    // Бургер-меню
    const burger = document.getElementById('burger');
    const navMenu = document.getElementById('navMenu');
    
    burger.addEventListener('click', () => {
        burger.classList.toggle('active');
        navMenu.classList.toggle('active');
    });

    // Плавный скролл для кнопки наверх
    const scrollTopBtn = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => {
        scrollTopBtn.classList.toggle('visible', window.scrollY > 500);
    });
    
    scrollTopBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
</script>
